<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유림 텔레콤 현장대응 SOP</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-badge">YURIM TELECOM</div>
      <h1>유림 텔레콤 현장대응 SOP</h1>
      <p>
        신입 직원이 빠르게 이해하고 바로 활용할 수 있도록<br />
        SOP 매뉴얼 · 상품자료 · 테스트를 한 곳에 정리한 교육 페이지
      </p>
    </div>
  </header>

  <main class="container">
    <section class="menu-grid">
      <a class="menu-card premium-card" href="sop.html">
        <div class="menu-icon">📘</div>
        <h2>SOP 매뉴얼</h2>
        <p>상황별 응대 흐름과 현장 대응 SOP를 단계별로 확인</p>
      </a>

      <button class="menu-card premium-card" onclick="showSection('edu-section')">
        <div class="menu-icon">🗂️</div>
        <h2>상품자료</h2>
        <p>구글시트와 연동된 상품/요금/부가서비스 자료 확인</p>
      </button>

      <button class="menu-card premium-card" onclick="showSection('test-section')">
        <div class="menu-icon">📝</div>
        <h2>테스트</h2>
        <p>교육 내용을 바탕으로 문제를 풀고 결과를 확인</p>
      </button>
    </section>

    <section id="edu-section" class="content-section hidden">
      <div class="section-top">
        <div>
          <h3>상품자료</h3>
          <p class="section-sub">카테고리별 카드 형태로 정리된 상품자료</p>
        </div>
        <div class="badge" id="edu-count-badge">0개 항목</div>
      </div>
      <div id="edu-content-area" class="edu-grid"></div>
    </section>

    <section id="test-section" class="content-section hidden">
      <div class="section-top">
        <div>
          <h3>테스트</h3>
          <p class="section-sub">응시 후 점수와 오답을 확인할 수 있습니다</p>
        </div>
        <div class="badge" id="test-count-badge">0문항</div>
      </div>

      <div class="test-toolbar">
        <button class="primary-btn" onclick="startTest()">시험 시작</button>
        <button class="ghost-btn" onclick="submitTest()">제출하기</button>
      </div>

      <div id="test-question-area" class="test-list"></div>
      <div id="test-result-area" class="test-result"></div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/test.js"></script>
</body>
</html>
